version: '3.9'

services:
  postgres:
    image: postgres:18-alpine
    container_name: jetsindex_db
    restart: always
    environment:
      POSTGRES_DB: jetsindex_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
